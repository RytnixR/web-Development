<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow </title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 17px 3px #888888;
            border-radius: 14px;
            outline: 2px solid darkgreen;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>
</body>
</html>
