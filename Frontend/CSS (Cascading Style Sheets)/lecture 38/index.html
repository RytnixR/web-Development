<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox</title>
    <style>
        .container{
            border: 2px solid red;
            display: flex;
            height: 80vh;
            justify-content: center;
            /* align-items: center;   its is for single line*/
            align-content: center;  /*  this is for multiple line */
            flex-wrap: wrap;
            /* flex-direction: column-reverse;   column , row, row reverse,column-reverse */
             gap: 80px 30px; /*    row-gap , column-gap   */

        }
        .item{
            height: 72px;
            width: 72px;
            border: 2px solid black;
            margin: 4px;
            padding: 2px;
            background-color: blueviolet;
            /* align-self,flex-grow,flex-shrink */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
</body>
</html>
