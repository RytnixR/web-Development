<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms - lets learn it</title>
</head>

<body>
    <h1>form for applying for teaching</h1>
    <div>

        <form action="post">
            <label for="username"> Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </form>
    </div>
    <div>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">female</label>
    </div>
    <div>
        <input type="checkbox" id="Subscribe" name="Subscribe" value="yes">
        <label for="Subscribe">Subscribed to channel</label>
    </div>
    <div>
        <label for="comments">Enter your comments</label>
        <br>
        <textarea id="comments" name="" id="" cols="50" rows="10"></textarea>
    </div>
    <div>
        <select name="quality" id="">
            <option value="Good">Good</option>
            <option value="bad">bad</option>
            <option value="Excelent">Excelent</option>
            <option value="Not interested">Not interested</option>
        </select>
    </div>
</body>

</html>
